name: Build, Release, and Publish

# Triggers on any tag push matching v* (e.g. v2.2.0).
# Can also be run manually to rebuild and republish an existing tag.
on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v2.3.0)'
        required: true
        type: string

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build-release-publish:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Derive the semver version from the tag (strip leading 'v')
      # -----------------------------------------------------------------------
      - name: Resolve tag and version
        id: version
        shell: pwsh
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_INPUT_TAG:  ${{ inputs.tag }}
          GH_REF_NAME:   ${{ github.ref_name }}
        run: |
          if ($env:GH_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = $env:GH_INPUT_TAG
          } else {
            $tag = $env:GH_REF_NAME
          }
          $version = $tag.TrimStart('v')
          "TAG=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version: $version  (tag: $tag)"

      # -----------------------------------------------------------------------
      # 2. Checkout — full history lets --generate-notes span all commits
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      # -----------------------------------------------------------------------
      # 3. Publish the .NET application (self-contained single-file, version stamped from the tag)
      # -----------------------------------------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Publish application
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $v = $env:BUILD_VERSION
          dotnet publish qbPortWeaver.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:Version=$v `
            /p:FileVersion="$v.0" `
            /p:AssemblyVersion="$v.0"

      # -----------------------------------------------------------------------
      # 4. Build the MSI installer using WiX Toolset v4 (pinned to latest 4.0.x)
      # -----------------------------------------------------------------------
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version "4.0.6"
          wix extension add WixToolset.UI.wixext/4.0.6 WixToolset.Util.wixext/4.0.6 --global
          wix --version

      - name: Build MSI installer
        id: msi
        shell: pwsh
        env:
          BUILD_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:BUILD_VERSION

          wix build installer\qbPortWeaver.wxs `
            -arch x64 `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -b installer\ `
            -d ProductVersion=$version `
            -out "installer\qbPortWeaver_${version}_Setup.msi"

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $setupMsi = "installer\qbPortWeaver_${version}_Setup.msi"
          if (-not (Test-Path $setupMsi)) {
            Write-Error "Expected installer not found: $setupMsi"
            exit 1
          }

          "SETUP_PATH=$setupMsi" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer ready: $setupMsi"

      # -----------------------------------------------------------------------
      # 5. Compute SHA256 checksum of the local MSI
      #    (computed here so we avoid re-downloading from the release later)
      # -----------------------------------------------------------------------
      - name: Compute installer checksum
        id: checksum
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
          RELEASE_TAG:     ${{ steps.version.outputs.TAG }}
          SETUP_PATH:      ${{ steps.msi.outputs.SETUP_PATH }}
        run: |
          $version   = $env:RELEASE_VERSION
          $tag       = $env:RELEASE_TAG
          $assetName = "qbPortWeaver_${version}_Setup.msi"
          $url       = "https://github.com/martsg666/qbPortWeaver/releases/download/$tag/$assetName"
          $checksum  = (Get-FileHash -Path $env:SETUP_PATH -Algorithm SHA256).Hash.ToUpper()

          Write-Host "Asset : $assetName"
          Write-Host "URL   : $url"
          Write-Host "SHA256: $checksum"

          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "DOWNLOAD_URL=$url"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "CHECKSUM=$checksum"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # 6. Stamp version, URL, and checksum into the Chocolatey package files
      # -----------------------------------------------------------------------
      - name: Update Chocolatey package files
        shell: pwsh
        env:
          RELEASE_VERSION:    ${{ steps.version.outputs.VERSION }}
          ASSET_DOWNLOAD_URL: ${{ steps.checksum.outputs.DOWNLOAD_URL }}
          ASSET_CHECKSUM:     ${{ steps.checksum.outputs.CHECKSUM }}
        run: |
          $version     = $env:RELEASE_VERSION
          $downloadUrl = $env:ASSET_DOWNLOAD_URL
          $checksum    = $env:ASSET_CHECKSUM

          # nuspec — version and release notes URL
          $nuspecPath = 'choco\qbPortWeaver.nuspec'
          (Get-Content $nuspecPath) `
            -replace 'TEMPLATE_VERSION', $version |
            Set-Content $nuspecPath

          # chocolateyInstall.ps1 — download URL and checksum
          $installPath = 'choco\tools\chocolateyInstall.ps1'
          (Get-Content $installPath) `
            -replace 'TEMPLATE_URL',      $downloadUrl `
            -replace 'TEMPLATE_CHECKSUM', $checksum |
            Set-Content $installPath

          # VERIFICATION.txt — version, URL, and checksum
          $verifyPath = 'choco\tools\VERIFICATION.txt'
          (Get-Content $verifyPath) `
            -replace 'TEMPLATE_VERSION',  $version `
            -replace 'TEMPLATE_URL',      $downloadUrl `
            -replace 'TEMPLATE_CHECKSUM', $checksum |
            Set-Content $verifyPath

          Write-Host "Chocolatey package files updated for v$version"

      # -----------------------------------------------------------------------
      # 7. Validate that all TEMPLATE_ placeholders were replaced
      # -----------------------------------------------------------------------
      - name: Validate placeholder substitution
        shell: pwsh
        run: |
          $files = @(
            'choco\qbPortWeaver.nuspec',
            'choco\tools\chocolateyInstall.ps1',
            'choco\tools\VERIFICATION.txt'
          )
          $found = $false
          foreach ($file in $files) {
            if (Select-String -Path $file -Pattern 'TEMPLATE_' -Quiet) {
              Write-Error "Unreplaced TEMPLATE_ placeholder found in: $file"
              $found = $true
              write-error $(get-content $file)
            }
          }
          if ($found) { exit 1 }
          Write-Host "All placeholders replaced successfully."

      # -----------------------------------------------------------------------
      # 8. Pack the Chocolatey package
      # -----------------------------------------------------------------------
      - name: Pack Chocolatey package
        id: pack
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:RELEASE_VERSION
          choco pack choco\qbPortWeaver.nuspec --output-directory .
          # Use the explicit versioned filename rather than a wildcard to avoid
          # accidentally picking up a stale .nupkg from a previous run
          $nupkg = Get-Item "qbportweaver.$version.nupkg"
          Write-Host "Created: $($nupkg.Name)"
          "NUPKG_PATH=$($nupkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # 9. Create GitHub Release with auto-generated notes, or update existing
      # -----------------------------------------------------------------------
      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.TAG }}
          SETUP_PATH:  ${{ steps.msi.outputs.SETUP_PATH }}
        run: |
          $tag   = $env:RELEASE_TAG
          $asset = $env:SETUP_PATH

          # Check whether the release already exists (e.g. manual re-run)
          gh release view $tag 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists — uploading asset"
            gh release upload $tag $asset --clobber
          } else {
            Write-Host "Creating release $tag"
            gh release create $tag $asset `
              --title "qbPortWeaver $tag" `
              --generate-notes
          }

      # -----------------------------------------------------------------------
      # 10. Push to Chocolatey Community Repository
      # -----------------------------------------------------------------------
      - name: Push to Chocolatey Community Repository
        shell: pwsh
        env:
          RELEASE_VERSION:    ${{ steps.version.outputs.VERSION }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $version = $env:RELEASE_VERSION
          # Use the explicit versioned filename — same reasoning as the pack step
          $nupkg = Get-Item "qbportweaver.$version.nupkg"
          Write-Host "Pushing: $($nupkg.Name)"
          choco push $nupkg.FullName `
            --source https://push.chocolatey.org/ `
            --api-key $env:CHOCOLATEY_API_KEY
