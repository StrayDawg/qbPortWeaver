name: Publish to Chocolatey Community Repository

# Triggers automatically when a GitHub Release is published.
# The release must have been built by the "Build and Release" workflow first
# (i.e., the asset qbPortWeaver_{version}_Setup.exe must already exist on the release).
on:
  release:
    types: [published]

  # Allow manual dispatch to re-push a specific tag without deleting/re-publishing the release.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to package (e.g. v2.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  chocolatey-publish:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Resolve tag name — works for both event-driven and manual triggers
      # -----------------------------------------------------------------------
      - name: Resolve release tag
        id: tag
        shell: pwsh
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_INPUT_TAG: ${{ inputs.tag }}
          GH_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if ($env:GH_EVENT_NAME -eq 'workflow_dispatch') {
            $tag = $env:GH_INPUT_TAG
          } else {
            $tag = $env:GH_RELEASE_TAG
          }
          $version = $tag.TrimStart('v')
          "TAG=$tag"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Packaging version: $version (tag: $tag)"

      # -----------------------------------------------------------------------
      # 2. Checkout — needed to access the choco/ package source files
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 3. Install Chocolatey (already present on windows-latest but pin version)
      # -----------------------------------------------------------------------
      - name: Ensure Chocolatey is available
        shell: pwsh
        run: |
          if (-not (Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }
          choco --version

      # -----------------------------------------------------------------------
      # 4. Download the release asset and compute its SHA256 checksum
      # -----------------------------------------------------------------------
      - name: Download release asset and compute checksum
        id: asset
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.VERSION }}
          RELEASE_TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          $version   = $env:RELEASE_VERSION
          $tag       = $env:RELEASE_TAG
          $assetName = "qbPortWeaver_${version}_Setup.exe"
          $url       = "https://github.com/martsg666/qbPortWeaver/releases/download/$tag/$assetName"

          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile $assetName -UseBasicParsing

          $checksum = (Get-FileHash -Path $assetName -Algorithm SHA256).Hash.ToUpper()
          Write-Host "SHA256: $checksum"

          "ASSET_NAME=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "DOWNLOAD_URL=$url"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "CHECKSUM=$checksum"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # -----------------------------------------------------------------------
      # 5. Stamp version, URL, and checksum into the package source files
      # -----------------------------------------------------------------------
      - name: Update package files with release details
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.tag.outputs.VERSION }}
          ASSET_DOWNLOAD_URL: ${{ steps.asset.outputs.DOWNLOAD_URL }}
          ASSET_CHECKSUM: ${{ steps.asset.outputs.CHECKSUM }}
        run: |
          $version     = $env:RELEASE_VERSION
          $downloadUrl = $env:ASSET_DOWNLOAD_URL
          $checksum    = $env:ASSET_CHECKSUM

          # nuspec — version and release notes URL
          $nuspecPath = 'choco\qbPortWeaver.nuspec'
          (Get-Content $nuspecPath) `
            -replace 'TEMPLATE_VERSION', $version |
            Set-Content $nuspecPath

          # chocolateyInstall.ps1 — download URL and checksum
          $installPath = 'choco\tools\chocolateyInstall.ps1'
          (Get-Content $installPath) `
            -replace 'TEMPLATE_URL',      $downloadUrl `
            -replace 'TEMPLATE_CHECKSUM', $checksum |
            Set-Content $installPath

          # VERIFICATION.txt — version, URL, and checksum
          $verifyPath = 'choco\tools\VERIFICATION.txt'
          (Get-Content $verifyPath) `
            -replace 'TEMPLATE_VERSION',  $version `
            -replace 'TEMPLATE_URL',      $downloadUrl `
            -replace 'TEMPLATE_CHECKSUM', $checksum |
            Set-Content $verifyPath

          Write-Host "Package files updated for v$version"

      # -----------------------------------------------------------------------
      # 6. Pack the Chocolatey package
      # -----------------------------------------------------------------------
      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          choco pack choco\qbPortWeaver.nuspec --output-directory .
          $nupkg = Get-Item "*.nupkg" | Select-Object -First 1
          Write-Host "Created: $($nupkg.Name)"
          "NUPKG_PATH=$($nupkg.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: pack

      # -----------------------------------------------------------------------
      # 7. Push to Chocolatey Community Repository
      # -----------------------------------------------------------------------
      - name: Push to Chocolatey Community Repository
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $nupkg = Get-Item "*.nupkg" | Select-Object -First 1
          Write-Host "Pushing: $($nupkg.Name)"
          choco push $nupkg.FullName `
            --source https://push.chocolatey.org/ `
            --api-key $env:CHOCOLATEY_API_KEY
